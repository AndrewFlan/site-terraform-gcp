name: Terraform

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

# Required for Workload Identity Federation
permissions:
    id-token: write
    contents: read
    pull-requests: write

jobs:
    terraform:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Authenticate to GCP via Workload Identity Federation
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
                  service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

            - name: Set up gcloud
              uses: google-github-actions/setup-gcloud@v3

            - name: Install Terraform
              uses: hashicorp/setup-terraform@v4
              with:
                  terraform_version: "1.15.0"

            - name: Terraform Init
              run: terraform init

            - name: Terraform Plan
              env:
                  TF_VAR_ansible_ssh_public_key: ${{ secrets.ANSIBLE_SSH_PUBLIC_KEY }}
              run: |
                  set -o pipefail
                  terraform plan \
                      -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
                      -out=tfplan 2>&1 | tee plan_output.txt

            - name: Comment plan on PR
              if: github.event_name== 'pull_request'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  PLAN=$(cat plan_output.txt)
                  MARKER="<!-- terraform-plan -->"

                  # Find existing comment ID if it exists
                  COMMENT_ID=$(gh api \
                    repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
                    --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -1)

                  BODY="$MARKER
                  ## Terraform Plan
                  \`\`\`hcl
                  $PLAN
                  \`\`\`"

                  if [ -n "$COMMENT_ID" ]; then
                      # Update existing comment
                      gh api \
                      repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
                      -X PATCH \
                      -f body="$BODY"
                  else
                      # Create new comment
                      gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
                  fi

            # Only apply on push to main, not on pull requests
            - name: Terraform Apply
              if: github.ref == 'refs/heads/main' && github.event_name == 'push'
              env:
                  TF_VAR_ansible_ssh_public_key: ${{ secrets.ANSIBLE_SSH_PUBLIC_KEY }}
              run: terraform apply -auto-approve tfplan

            - name: Update GCP instance name secret
              if: github.ref == 'refs/heads/main' && github.event_name == 'push'
              env:
                  GH_TOKEN: ${{ secrets.GH_PAT }}
              run: |
                  INSTANCE_NAME=$(terraform output -raw instance_name)
                  gh secret set GCP_INSTANCE_NAME \
                    --repo AndrewFlan/my-website \
                    --body "$INSTANCE_NAME"
